name: Deploy Chatbot Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages Metadata
        uses: actions/configure-pages@v5

      - name: Pack Production Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Publish Website Live
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Output Live URL
        run: |
          echo "### 🚀 Chatbot frontend deployed successfully" >> $GITHUB_STEP_SUMMARY
          echo "Live URL: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
